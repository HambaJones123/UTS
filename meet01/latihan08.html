<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Form Input Types</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 20px;
        }
        h1 {
            color: #333333;
        }
        form {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        label {
            display: block;
            margin-top: 10px;
            color: #555555;
        }
        input[type="text"],
        input[type="password"],
        input[type="email"],
        input[type="number"],
        input[type="date"],
        input[type="color"],
        input[type="range"] {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #cccccc;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1>Different Input Types</h1>
    <form>
        <label>Text: <input type="text" placeholder="Enter text"></label><br><br>

        <label>Password: <input type="password" placeholder="Enter password"></label><br><br>

        <label>Email: <input type="email" placeholder="Enter email"></label><br><br>

        <label>Number: <input type="number" min="1" max="100"></label><br><br>

        <label>Date: <input type="date"></label><br><br>

        <label>Color: <input type="color"></label><br><br>

        <label>Range: <input type="range" min="0" max="100" value="50"></label><br><br>

        <fieldset>
            <legend>Choose your favorite:</legend>
            <label><input type="radio" name="favorite" value="html"> HTML</label><br>
            <label><input type="radio" name="favorite" value="css"> CSS</label><br>
            <label><input type="radio" name="favorite" value="js"> JavaScript</label>
        </fieldset>
    </form>
</body>
</html>
