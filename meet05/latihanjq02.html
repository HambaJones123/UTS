<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="container mt-5 mb-5">
        <div class="row">
            <div class="col-sm-3"><input type="text" id="kode" placeholder="Masukkan Kode"></div>
            <div class="col-sm-3"><input type="text" id="nama" placeholder="Masukkan Nama"></div>
            <div class="col-sm-3"><input type="number" id="harga" placeholder="Masukkan Harga"></div>
            <div class="col-sm-3"><button id="btnTambah">Tambah</button></div>
        </div>
        <table class="table">
            <thead>
                <tr>
                    <th>Action</th>
                    <th>Kode</th>
                    <th>Nama</th>
                    <th>Harga</th>
                </tr>
            </thead>
            <tbody id="tableData">

            </tbody>
            <tfoot id="tableFooter">
                <tr>
                    <td colspan="3">Total</td>
                    <td id="total">0</td>
                </tr>
            </tfoot>
        </table>
    </div>
    <script>


        $(document).ready(function () {
            $("#btnTambah").click(function () {
                let kode = $("#kode").val();
                let nama = $("#nama").val();
                let harga = $("#harga").val();
                $("#tableData").append("<tr><td><button class=\"remove\" id=\"" + kode + "\">X</button></td><td>"
                    + kode + "</td><td>" + nama + "</td><td>" + harga + "</td>" + "</tr>");
                hitungTotal();
            })
            $("#tableData").on("click", ".remove", function () {
                console.log("test");
                $(this).closest("tr").remove();
                hitungTotal();
            })
        })
    </script>
    <script>
        function hitungTotal() {
            let total = 0;
            $("#tableData tr").each(function () {
                let harga = $(this).find("td").eq(3).text();
                total += parseFloat(harga);
            });
            $("#total").text("Total: " + total);
        }
    </script>

</body>

</html>
