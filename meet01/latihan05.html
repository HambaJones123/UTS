<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Images</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 20px;
        }
        h1 {
            color: #333333;
        }
        p {
            color: #666666;
        }
    </style>
</head>
<body>
    <h1> Working with Images </h1>
    <img src="https://gate.dinamika.ac.id/api/foto_profil/24410100063" alt="Profile Picture" width="200" height="300">
    
    <h2> Image with Caption </h2>
    <figure>
        <img src="https://gate.dinamika.ac.id/api/foto_profil/24410100063" alt="Profile Picture" width="200" height="300">
        <figcaption> This is a figure with a caption. </figcaption>
    </figure>

    <h2> Clickable Image </h2>
    <a href="https://dinamika.ac.id">
        <img src="https://gate.dinamika.ac.id/api/foto_profil/24410100063" alt="Profile Picture" width="200" height="300">
    </a>
</body>
</html>
