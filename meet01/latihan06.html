<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Tables</title>
    <style>
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Student Grades Table</h1>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Subject</th>
                <th>Grade</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>John Doe</td>
                <td>Math</td>
                <td>95</td>
                <td>Pass</td>
            </tr>
            <tr>
                <td>Jane Smith</td>
                <td>Science</td>
                <td>87</td>
                <td>Pass</td>
            </tr>
            <tr>
                <td>Bob Johnson</td>
                <td>English</td>
                <td>92</td>
                <td>Pass</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
