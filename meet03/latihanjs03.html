<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan JavaScript 03</title>
    <link rel="stylesheet" href="mystyle.css">
</head>
<body>
<br>
    <a href="index.html">Kembali</a>
<h1>Latihan JavaScript 03</h1>
<h2>Penjumlahan Dua Bilangan</h2>
    <label style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">Nilai 1:</label>
    <br>
    <input type="number" id="nilai1" style="margin-bottom: 10px;">
    <br>
    <label style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">Nilai 2:</label>
    <br>
    <input type="number" id="nilai2">
    <br>
    <button type="button" onclick="jumlah()" style="margin-top: 20px; margin-bottom: 20px; font-size: 24px; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">Jumlah</button>
    <br>
    <label style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;">Hasil:</label>
    <br>
    <input type="number" name="hasil" id="hasil" readonly style="margin-top: 10px;"></input>
</body>
<script>
    let x;
    let y;
    let z;
    z = x + y;
    function hitung() {
        x = Number(document.getElementById("nilai1").value);
        y = Number(document.getElementById("nilai2").value);
        z = x + y;
        document.getElementById("hasil").value = z;
    }
</script>
</html>
