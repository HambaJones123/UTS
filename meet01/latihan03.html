<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 20px;
        }
        h1 {
            color: #333333;
        }
        p {
            color: #666666;
        }
    </style>
</head>

<body>
    <h1> Different type of lists </h1>
    <h2> Unordered List </h2>
    <ul>
        <li> Apples </li>
        <li> Bananas </li>
        <li> Oranges </li>
    </ul>

    <h2> Ordered List </h2>
    <ol>
        <li> First step </li>
        <li> Second step </li>
        <li> Third step </li>
    </ol>

    <h2> Description List </h2>
    <dl>
        <dt> HTML </dt>
        <dd> HyperText Markup Language </dd>
        <dt> CSS </dt>
        <dd> Cascading Style Sheets </dd>
        <dt> JavaScript </dt>
        <dd> Programming language for web development </dd>
    </dl>
</body>
</html>
