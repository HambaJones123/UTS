<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML buttons</title>
    <style>
        .btn {padding: 10px 20px; margin: 5px; cursor: pointer; }
        .primary {background: #007bff; color: white; border: none; }
        .success {background: #28a745; color: white; border: none; }
        .danger {background: #dc3545; color: white; border: none; }

        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Different Types of Buttons</h1>
    <button type="button" class="btn primary"> Primary Button </button>
    <button type="button" class="btn success"> Success Button </button>
    <button type="button" class="btn danger"> Danger Button </button>
    <br><br>
    <button disabled> Disabled button </button>
    <br><br>
    <a href="#" style="padding: 10px 20px; background: #6c757d; color: white; text-decoration: none;" > Link Button </a>

</body>
</html>
