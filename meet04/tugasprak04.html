    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;

        .card-hover:hover {

            color: white;
            min-height: 400px;
            display: flex;
            align-items: center;
        }

        .movie-poster {
            object-fit: cover;
            object-position: center;
            width: 100%;
        }
    </style>
</head>

<body class="bg-light">
